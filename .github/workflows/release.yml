name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and release. Defaults to branch or SHA that triggered manual run.
        required: false
        type: string
      version:
        description: Release version or tag name. Leave empty to publish a SHA-based dry-run build.
        required: false
        type: string
      publish:
        description: Publish GitHub release after build completes.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      verify_tag: ${{ steps.meta.outputs.verify_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || github.sha) || github.ref }}
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          MANUAL_REF: ${{ inputs.ref }}
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          checkout_ref="${MANUAL_REF:-${GITHUB_SHA}}"
          target_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            verify_tag=true
          elif [[ -n "${MANUAL_VERSION}" ]]; then
            release_tag="${MANUAL_VERSION}"
            verify_tag=false
          else
            release_tag="sha-${short_sha}"
            verify_tag=false
          fi

          release_tag_pattern='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'
          if [[ "${release_tag}" =~ ${release_tag_pattern} ]]; then
            expected_version="${release_tag#v}"
            cargo_version="$(
              awk -F ' *= *' '
                $1 == "version" {
                  gsub(/"/, "", $2)
                  print $2
                  exit
                }
              ' Cargo.toml
            )"
            if [[ "${cargo_version}" != "${expected_version}" ]]; then
              echo "Cargo.toml version ${cargo_version} does not match release tag ${release_tag}" >&2
              exit 1
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "release tag must match vX.Y.Z or vX.Y.Z-prerelease: ${release_tag}" >&2
            exit 1
          fi

          {
            echo "checkout_ref=${checkout_ref}"
            echo "release_tag=${release_tag}"
            echo "target_sha=${target_sha}"
            echo "verify_tag=${verify_tag}"
          } >> "${GITHUB_OUTPUT}"

  validate:
    name: validate source
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features

  build:
    name: build (${{ matrix.asset_name }})
    needs:
      - prepare
      - validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: linux-x64
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: macos-arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --bin gate-agent --target ${{ matrix.target }}

      - name: Package archives
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          versioned_archive="gate-agent-${RELEASE_TAG}-${{ matrix.asset_name }}.tar.gz"
          latest_archive="gate-agent-latest-${{ matrix.asset_name }}.tar.gz"
          mkdir -p dist/package dist/assets
          cp "target/${{ matrix.target }}/release/gate-agent" "dist/package/gate-agent"
          chmod +x "dist/package/gate-agent"
          tar -C dist/package -czf "dist/assets/${versioned_archive}" gate-agent
          cp "dist/assets/${versioned_archive}" "dist/assets/${latest_archive}"

      - name: Upload packaged archives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/assets/*
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: github.event_name == 'push' || inputs.publish
    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum "gate-agent-${RELEASE_TAG}"-*.tar.gz > "gate-agent-${RELEASE_TAG}-sha256sums.txt"
          sha256sum gate-agent-latest-*.tar.gz > gate-agent-latest-sha256sums.txt

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
          VERIFY_TAG: ${{ needs.prepare.outputs.verify_tag }}
        run: |
          set -euo pipefail
          prerelease_args=()
          latest_args=(--latest)
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            prerelease_args=(--prerelease)
            latest_args=(--latest=false)
          fi

          if ! gh release view -R "${GH_REPO}" "${RELEASE_TAG}" >/dev/null 2>&1; then
            if [[ "${VERIFY_TAG}" == "true" ]]; then
              gh release create -R "${GH_REPO}" "${RELEASE_TAG}" --verify-tag --title "${RELEASE_TAG}" --generate-notes "${prerelease_args[@]}" "${latest_args[@]}"
            else
              gh release create -R "${GH_REPO}" "${RELEASE_TAG}" --target "${TARGET_SHA}" --title "${RELEASE_TAG}" --generate-notes "${prerelease_args[@]}" "${latest_args[@]}"
            fi
          fi

          release_assets=(
            "dist/gate-agent-${RELEASE_TAG}-linux-x64.tar.gz"
            "dist/gate-agent-${RELEASE_TAG}-macos-arm64.tar.gz"
            "dist/gate-agent-${RELEASE_TAG}-sha256sums.txt"
          )
          if [[ "${RELEASE_TAG}" != *-* ]]; then
            release_assets+=(
              "dist/gate-agent-latest-linux-x64.tar.gz"
              "dist/gate-agent-latest-macos-arm64.tar.gz"
              "dist/gate-agent-latest-sha256sums.txt"
            )
          fi

          gh release upload -R "${GH_REPO}" "${RELEASE_TAG}" "${release_assets[@]}" --clobber
