name: prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v, for example 1.2.3.
        required: true
        type: string
      ref:
        description: Source ref to release.
        required: false
        default: master
        type: string
      dry_run:
        description: Validate only. Do not create or push the release tag.
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: validate release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Validate release metadata
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release version must match X.Y.Z: ${RELEASE_VERSION}" >&2
            exit 1
          fi

          cargo_version="$(
            awk -F ' *= *' '
              $1 == "version" {
                gsub(/"/, "", $2)
                print $2
                exit
              }
            ' Cargo.toml
          )"

          if [[ "${cargo_version}" != "${RELEASE_VERSION}" ]]; then
            echo "Cargo.toml version ${cargo_version} does not match release version ${RELEASE_VERSION}" >&2
            exit 1
          fi

          release_tag="v${RELEASE_VERSION}"
          if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            echo "release tag already exists: ${release_tag}" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features

      - name: Create release tag
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          release_tag="v${RELEASE_VERSION}"
          git \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            tag -a "${release_tag}" -m "Release ${release_tag}"
          git push origin "refs/tags/${release_tag}"
