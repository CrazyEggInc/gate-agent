name: prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v, for example 1.2.3 or 1.2.3-beta.
        required: true
        type: string
      ref:
        description: Source ref to release.
        required: false
        default: master
        type: string
      dry_run:
        description: Validate only. Do not push the version bump or release tag.
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    name: validate release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Validate release metadata
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          release_version_pattern='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'
          if [[ ! "${RELEASE_VERSION}" =~ ${release_version_pattern} ]]; then
            echo "release version must match X.Y.Z or X.Y.Z-prerelease: ${RELEASE_VERSION}" >&2
            exit 1
          fi

          release_tag="v${RELEASE_VERSION}"
          if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            echo "release tag already exists: ${release_tag}" >&2
            exit 1
          fi

      - name: Bump package version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          cargo metadata --format-version 1 --no-deps | jq -e '.packages[] | select(.name == "gate-agent")' >/dev/null
          cargo set-version "${RELEASE_VERSION}"
          cargo metadata --format-version 1 >/dev/null
          cargo_version="$(
            cargo metadata --format-version 1 --no-deps \
              | jq -r '.packages[] | select(.name == "gate-agent") | .version'
          )"

          if [[ "${cargo_version}" != "${RELEASE_VERSION}" ]]; then
            echo "Cargo.toml version ${cargo_version} does not match release version ${RELEASE_VERSION}" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features

      - name: Commit version bump and create release tag
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          release_branch="${RELEASE_REF#refs/heads/}"

          if ! git ls-remote --exit-code --heads origin "${release_branch}" >/dev/null; then
            echo "non-dry release ref must be a branch that can receive the version bump: ${RELEASE_REF}" >&2
            exit 1
          fi

          release_tag="v${RELEASE_VERSION}"
          git \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            add Cargo.toml Cargo.lock
          if ! git diff --cached --quiet; then
            git \
              -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "chore(release): prepare ${release_tag}"
          fi
          git \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            tag -a "${release_tag}" -m "Release ${release_tag}"
          git push --atomic origin "HEAD:refs/heads/${release_branch}" "refs/tags/${release_tag}"
          gh workflow run release.yml \
            --ref "${release_branch}" \
            -f ref="${release_tag}" \
            -f version="${release_tag}" \
            -f publish=true
